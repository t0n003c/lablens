name: Feature request
description: Suggest an improvement or new LabLens workflow.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: user_need
    attributes:
      label: What should be easier?
      description: Describe the user problem or workflow gap.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want to see.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard
        - Upload/review
        - Reports
        - People
        - Settings/security
        - NAS/deployment
        - Recommendations
        - Other
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add examples, references, or constraints.
