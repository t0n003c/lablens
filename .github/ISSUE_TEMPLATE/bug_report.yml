name: Bug report
description: Report something broken in LabLens.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the shortest path that reproduces the bug.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Local Mac, NAS/Dockge, browser/device, and app version if known.
      placeholder: "NAS/Dockge, Chrome, LabLens 1.1.1"
  - type: textarea
    id: notes
    attributes:
      label: Notes or screenshots
      description: Add logs, screenshots, or related context.
