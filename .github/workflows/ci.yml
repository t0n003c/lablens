name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://lablens:lablens_dev_password@localhost:5432/lablens?schema=public
  SESSION_SECRET: ci-session-secret-change-only-for-github-checks
  DATA_ENCRYPTION_KEY: ci-data-encryption-key-placeholder
  POSTGRES_PASSWORD: release-check

jobs:
  validate:
    name: Validate app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test

      - name: Lint
        run: npm run lint

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Production build
        run: npm run build

      - name: Prisma schema validation
        run: npx prisma validate

      - name: Create CI compose env
        run: |
          cat > .env <<'EOF'
          APP_URL=http://localhost:3000
          SESSION_SECRET=ci-session-secret-change-only-for-github-checks
          POSTGRES_USER=lablens
          POSTGRES_PASSWORD=release-check
          POSTGRES_DB=lablens
          MAX_UPLOAD_MB=20
          STORE_RAW_PDFS=false
          UPLOAD_DIR=/app/data/uploads
          TURNSTILE_ENABLED=false
          AI_PROVIDER=mock
          AI_MODEL=local-lab-summary
          DATA_ENCRYPTION_KEY=ci-data-encryption-key-placeholder
          EOF

      - name: Compose validation
        run: |
          docker compose config --quiet
          docker compose -f docker-compose.image.yml config --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker build validation
        run: docker buildx build --load --platform linux/amd64 -t lablens-ci:${{ github.sha }} .
